<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Your Website Project</title>
    <style>
        /* Modern Animated Background */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* Hero Image */
        .hero-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
            font-size: 26px;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: #444;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            background: #fdfdfd;
        }

        /* Confirmation Text */
        .notice {
            background: #e7f3ff;
            color: #0056b3;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin: 15px 0;
            border-left: 4px solid #007bff;
            text-align: left;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #000;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=80" alt="Website Design" class="hero-img">
    
    <h1>Want to make website?</h1>
    <p class="subtitle">Fill out the details below to get started.</p>
    
    <form onsubmit="event.preventDefault(); alert('Request Received! We will text you soon.');">
        
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Your Name" required>
        </div>

        <div class="form-group">
            <label for="whatsapp">WhatsApp Number</label>
            <input type="tel" id="whatsapp" placeholder="e.g. +1234567890" required>
        </div>

        <div class="form-group">
            <label for="type">What kind of website?</label>
            <input type="text" id="type" placeholder="e.g. Portfolio, Blog, Shop">
        </div>

        <div class="form-group">
            <label for="content">What you want to include?</label>
            <textarea id="content" rows="3" placeholder="Pages, features, or ideas..."></textarea>
        </div>

        <div class="form-group">
            <label for="color">Colour of your website</label>
            <input type="text" id="color" placeholder="e.g. Blue & White">
        </div>

        <div class="notice">
            ℹ️ <strong>Note:</strong> We will text you from the given number to confirm it.
        </div>

        <button type="submit">Submit Request</button>
    </form>
</div>

</body>
</html>
